<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Pogoda</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <center>
    <h1>Dane pogodowe</h1>
    </center>
    <div class="container">
        <div class="data">

            <table>
                <tr>
                    <th>Temperatura</th>
                    <th>Wilgotność</th>
                    <th>Opis</th>
                </tr>
                <tr>
                    <td><span id="temperature">loading...</span> °C</td>
                    <td><span id="humidity">loading...</span> %</td>
                    <td><span id="desc">loading...</span></td>
                </tr>
            </table>
            
            
            
        </div>
    </div>
    <script>
        async function fetchData() {
            try {
                const response = await fetch('/weather');
                const json = await response.json();
                
                document.getElementById('temperature').innerText = json.temperature;
                document.getElementById('humidity').innerText = json.humidity;
                document.getElementById('desc').innerText = json.desc;
            } catch (err) {
                console.error("Błąd pobierania danych:", err);
            }
        }

        setInterval(fetchData, 1000);
        fetchData();
    </script>
</body>
</html>
